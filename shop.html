<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f0f4fb}
.acc-header{background:#173f8a;padding:20px 30px;display:flex;align-items:center;gap:12px}
.acc-header h1{color:#fff;font-size:22px;font-weight:600}
.container{max-width:1400px;margin:auto;padding:30px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filters button{padding:9px 18px;border:1px solid #ccc;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;transition:all 0.15s}
.filters button.active{background:#173f8a;color:#fff;border-color:#173f8a}
.filters button:hover:not(.active){background:#e8eef7}
.count-bar{font-size:13px;color:#666;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}
.pcard{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:14px;text-align:center;transition:border-color 0.15s;display:flex;flex-direction:column}
.pcard:hover{border-color:#173f8a}
.pcard-img{width:100%;height:150px;object-fit:contain;margin-bottom:10px;border-radius:8px;background:#f0f4fb;padding:8px}
.cat-badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:20px;margin-bottom:6px;background:#e8eef7;color:#173f8a}
.pcard h3{font-size:13px;font-weight:600;color:#222;margin:0 0 6px;line-height:1.4;flex:1}
.pcard .price{font-size:16px;font-weight:700;color:#173f8a;margin-bottom:10px}
.pcard button{width:100%;padding:9px;background:#173f8a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;transition:opacity 0.15s}
.pcard button:hover{opacity:0.85}
</style>
</head>

const catLabels = {
  helmet: "Helmet",
  "seat-cover": "Seat Cover",
  "crash-guard": "Crash Guard",
  "top-box": "Top Box",
  "riding-gear": "Riding Gear"
};

function render(filter) {
  const list = filter === 'all' ? products : products.filter(p => p.cat === filter);
  document.getElementById('countBar').textContent =
    list.length + ' product' + (list.length !== 1 ? 's' : '') +
    (filter !== 'all' ? ' in ' + catLabels[filter] : '');

  document.getElementById('grid').innerHTML = list.map(p => `
    <div class="pcard">
      <img class="pcard-img" src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/250x150/e8eef7/173f8a?text=${encodeURIComponent(catLabels[p.cat])}'">
      <span class="cat-badge">${catLabels[p.cat]}</span>
      <h3>${p.name}</h3>
      <div class="price">&#x20B9;${p.price.toLocaleString('en-IN')}</div>
      <button onclick="alert('${p.name.replace(/'/g,"\\'")}\\n\\nCategory: ${catLabels[p.cat]}\\nPrice: ₹${p.price.toLocaleString('en-IN')}')">View Details</button>
    </div>
  `).join('');
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-filter]');
  if (!btn) return;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(btn.dataset.filter);
});

render('all');
