<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop All Accessories — AutoGear</title>
<meta name="description" content="Browse premium vehicle accessories — filter by category, price and rating.">
<link rel="icon" href="images/logo.png">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div id="header"></div>

<div class="page-head">
  <div class="container">
    <h1 id="plpTitle">All Products</h1>
    <div class="crumbs"><a href="index.html">Home</a> / <span id="crumbCat">Shop</span></div>
  </div>
</div>

<div class="container">
  <div class="plp-wrap">
    <aside class="filters">
      <h4>Categories</h4>
      <div class="filter-group" id="catFilters"></div>
      <h4>Price Range</h4>
      <div class="filter-group">
        <label><input type="checkbox" class="price-f" value="0-5000"> Under ₹5,000</label>
        <label><input type="checkbox" class="price-f" value="5000-12500"> ₹5,000 – ₹12,500</label>
        <label><input type="checkbox" class="price-f" value="12500-25000"> ₹12,500 – ₹25,000</label>
        <label><input type="checkbox" class="price-f" value="25000-999999"> Over ₹25,000</label>
      </div>
      <h4>Rating</h4>
      <div class="filter-group">
        <label><input type="radio" name="rat" value="4"> 4★ & up</label>
        <label><input type="radio" name="rat" value="4.5"> 4.5★ & up</label>
        <label><input type="radio" name="rat" value="0" checked> All Ratings</label>
      </div>
      <button class="btn btn-ghost btn-block" onclick="clearFilters()">Reset Filters</button>
    </aside>
    <div>
      <div class="plp-head">
        <span id="resultCount" style="color:var(--muted);font-size:14px"></span>
        <select id="sort" onchange="render()">
          <option value="featured">Sort: Featured</option>
          <option value="low">Price: Low to High</option>
          <option value="high">Price: High to Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>
      <div class="grid" id="plpGrid"></div>
    </div>
  </div>
</div>

<div id="footer"></div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
mountChrome("shop");

const params = new URLSearchParams(location.search);
let activeCat = params.get("cat");

// Build category filters
const allCats = [...new Set(PRODUCTS.map(p=>p.category))];
document.getElementById("catFilters").innerHTML = allCats.map(c=>
  `<label><input type="checkbox" class="cat-f" value="${c}" ${activeCat===c?'checked':''}> ${c}</label>`
).join("");

if(activeCat){
  document.getElementById("plpTitle").textContent = activeCat + " Accessories";
  document.getElementById("crumbCat").textContent = activeCat;
}

function render(){
  const cats = [...document.querySelectorAll(".cat-f:checked")].map(i=>i.value);
  const prices = [...document.querySelectorAll(".price-f:checked")].map(i=>i.value.split("-").map(Number));
  const rat = parseFloat(document.querySelector("[name=rat]:checked").value);
  const sort = document.getElementById("sort").value;

  let list = PRODUCTS.filter(p=>{
    if(cats.length && !cats.includes(p.category)) return false;
    const priceINR = toINR(p.price);
    if(prices.length && !prices.some(([a,b])=>priceINR>=a && priceINR<=b)) return false;
    if(rat && p.rating < rat) return false;
    return true;
  });
  if(sort==="low") list.sort((a,b)=>toINR(a.price)-toINR(b.price));
  if(sort==="high") list.sort((a,b)=>toINR(b.price)-toINR(a.price));
  if(sort==="rating") list.sort((a,b)=>b.rating-a.rating);

  document.getElementById("resultCount").textContent = `${list.length} product${list.length!==1?'s':''} found`;
  document.getElementById("plpGrid").innerHTML = list.length
    ? list.map(productCard).join("")
    : `<div class="empty" style="grid-column:1/-1"><div class="ico">🔍</div><h3>No products match</h3><p>Try adjusting filters</p></div>`;
}
document.querySelectorAll(".cat-f,.price-f,[name=rat]").forEach(i=>i.addEventListener("change",render));
function clearFilters(){
  document.querySelectorAll(".cat-f,.price-f").forEach(i=>i.checked=false);
  document.querySelector("[name=rat][value='0']").checked = true;
  render();
}
render();
</script>
</body>
</html>
