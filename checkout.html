<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout — AutoGear</title>
<link rel="icon" href="images/logo.png">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div id="header"></div>

<div class="page-head">
  <div class="container">
    <h1>Checkout</h1>
    <div class="crumbs"><a href="index.html">Home</a> / <a href="cart.html">Cart</a> / <span>Checkout</span></div>
  </div>
</div>

<div class="container checkout-wrap">
  <div class="checkout-grid">
    <form class="panel checkout-form" id="checkoutForm">
      <div class="panel-head">
        <div>
          <h2>Shipping Details</h2>
          <p>Enter the delivery address for this order.</p>
        </div>
        <span class="step-badge">Step 1 of 2</span>
      </div>

      <div class="field-grid two">
        <div class="field"><label for="fullName">Full name</label><input id="fullName" name="fullName" required autocomplete="name" placeholder="Rahul Sharma"></div>
        <div class="field"><label for="phone">Phone number</label><input id="phone" name="phone" required autocomplete="tel" inputmode="tel" placeholder="9876543210"></div>
      </div>
      <div class="field"><label for="email">Email address</label><input id="email" name="email" type="email" required autocomplete="email" placeholder="rahul@example.com"></div>
      <div class="field"><label for="address1">Address line 1</label><input id="address1" name="address1" required autocomplete="address-line1" placeholder="House / Flat / Street"></div>
      <div class="field"><label for="address2">Address line 2</label><input id="address2" name="address2" autocomplete="address-line2" placeholder="Area / Landmark (optional)"></div>
      <div class="field-grid three">
        <div class="field"><label for="city">City</label><input id="city" name="city" required autocomplete="address-level2" placeholder="Mumbai"></div>
        <div class="field"><label for="state">State</label><input id="state" name="state" required autocomplete="address-level1" placeholder="Maharashtra"></div>
        <div class="field"><label for="pincode">PIN code</label><input id="pincode" name="pincode" required autocomplete="postal-code" inputmode="numeric" placeholder="400001"></div>
      </div>

      <div class="field-grid two">
        <div class="field"><label for="delivery">Delivery preference</label><select id="delivery" name="delivery"><option>Standard Delivery (3-5 days)</option><option>Express Delivery (1-2 days)</option></select></div>
        <div class="field"><label for="note">Order note</label><input id="note" name="note" placeholder="Leave at the gate, call on arrival..."></div>
      </div>

      <div class="checkout-actions">
        <a class="btn btn-ghost" href="cart.html">Back to Cart</a>
        <button class="btn btn-primary" type="submit">Continue to Payment</button>
      </div>
    </form>

    <aside class="panel order-panel" id="checkoutSummary"></aside>
  </div>
</div>

<div id="footer"></div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
mountChrome();

function getCheckoutTotals(){
  const cart = getCart();
  const items = cart.map(ci=>{
    const p = PRODUCTS.find(x=>x.id===ci.id);
    return p ? {...p, qty:ci.qty} : null;
  }).filter(Boolean);
  const sub = items.reduce((s,i)=>s+i.price*i.qty,0);
  const ship = sub>99?0:9.99;
  const tax = sub*0.08;
  return {items, sub, ship, tax, total:sub+ship+tax};
}

function renderSummary(){
  const state = getCheckoutTotals();
  if(!state.items.length){
    document.getElementById("checkoutSummary").innerHTML = `
      <div class="panel-head">
        <div><h2>Order Summary</h2><p>Your cart is empty.</p></div>
      </div>
      <a class="btn btn-primary btn-block" href="shop.html">Browse Products</a>`;
    return;
  }
  document.getElementById("checkoutSummary").innerHTML = `
    <div class="panel-head">
      <div>
        <h2>Order Summary</h2>
        <p>Review items before payment.</p>
      </div>
      <span class="step-badge">Step 1 of 2</span>
    </div>
    <div class="summary-items">
      ${state.items.map(i=>`
        <div class="summary-item">
          <img src="${i.img}" alt="${i.name}">
          <div>
            <h4>${i.name}</h4>
            <span>${i.qty} x ${formatINR(toINR(i.price))}</span>
          </div>
          <strong>${formatINR(toINR(i.price*i.qty))}</strong>
        </div>`).join("")}
    </div>
    <div class="summary-lines">
      <div class="line"><span>Subtotal</span><span>${formatINR(toINR(state.sub))}</span></div>
      <div class="line"><span>Shipping</span><span>${state.ship===0?"FREE":formatINR(toINR(state.ship))}</span></div>
      <div class="line"><span>Tax</span><span>${formatINR(toINR(state.tax))}</span></div>
      <div class="total"><span>Total</span><span>${formatINR(toINR(state.total))}</span></div>
    </div>
    <div class="policy-box">
      <strong>Secure checkout</strong>
      <p>Cash on delivery, UPI, and card payment are available on the next step. This is a static, deployable demo flow.</p>
    </div>`;
}

function loadDraft(){
  const draft = JSON.parse(localStorage.getItem("ag_checkout_draft") || "null");
  if(!draft) return;
  ["fullName","phone","email","address1","address2","city","state","pincode","delivery","note"].forEach(id=>{
    if(draft[id] !== undefined) document.getElementById(id).value = draft[id];
  });
}

document.getElementById("checkoutForm").addEventListener("submit", e=>{
  e.preventDefault();
  const state = getCheckoutTotals();
  if(!state.items.length){
    toast("Your cart is empty");
    setTimeout(()=>location.href="shop.html",700);
    return;
  }
  const form = new FormData(e.target);
  const draft = Object.fromEntries(form.entries());
  draft.items = state.items;
  draft.subtotal = state.sub;
  draft.shipping = state.ship;
  draft.tax = state.tax;
  draft.total = state.total;
  draft.currency = "INR";
  localStorage.setItem("ag_checkout_draft", JSON.stringify(draft));
  setTimeout(()=>location.href="payment.html",150);
});

renderSummary();
loadDraft();
</script>
</body>
</html>
