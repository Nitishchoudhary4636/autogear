<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Payment — AutoGear</title>
<link rel="icon" href="images/logo.png">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div id="header"></div>

<div class="page-head">
  <div class="container">
    <h1>Payment</h1>
    <div class="crumbs"><a href="index.html">Home</a> / <a href="checkout.html">Checkout</a> / <span>Payment</span></div>
  </div>
</div>

<div class="container checkout-wrap">
  <div class="checkout-grid">
    <section class="panel checkout-form">
      <div class="panel-head">
        <div>
          <h2>Choose Payment Method</h2>
          <p>All payment options below are built for a static demo checkout.</p>
        </div>
        <span class="step-badge">Step 2 of 2</span>
      </div>

      <div class="saved-address" id="addressCard"></div>

      <div class="payment-methods" id="methods">
        <label class="payment-option active">
          <input type="radio" name="payMethod" value="upi" checked>
          <div>
            <strong>UPI</strong>
            <span>Pay using GPay, PhonePe, Paytm, or any UPI app.</span>
          </div>
        </label>
        <label class="payment-option">
          <input type="radio" name="payMethod" value="card">
          <div>
            <strong>Credit / Debit Card</strong>
            <span>Card payment form for client-ready checkout.</span>
          </div>
        </label>
        <label class="payment-option">
          <input type="radio" name="payMethod" value="cod">
          <div>
            <strong>Cash on Delivery</strong>
            <span>Pay when your order is delivered.</span>
          </div>
        </label>
      </div>

      <form id="paymentForm" class="payment-fields">
        <div class="field-grid two" id="cardFields">
          <div class="field"><label for="cardName">Name on card</label><input id="cardName" autocomplete="cc-name" placeholder="Rahul Sharma"></div>
          <div class="field"><label for="cardNumber">Card number</label><input id="cardNumber" autocomplete="cc-number" inputmode="numeric" placeholder="4111 1111 1111 1111"></div>
          <div class="field"><label for="expiry">Expiry</label><input id="expiry" autocomplete="cc-exp" placeholder="12/28"></div>
          <div class="field"><label for="cvv">CVV</label><input id="cvv" autocomplete="cc-csc" inputmode="numeric" placeholder="123"></div>
        </div>

        <div class="field"><label for="upiId">UPI ID</label><input id="upiId" placeholder="rahul@upi"></div>
        <div class="field"><label for="coupon">Coupon code</label><input id="coupon" placeholder="Optional"></div>

        <div class="checkout-actions">
          <a class="btn btn-ghost" href="checkout.html">Back to Checkout</a>
          <button class="btn btn-primary" type="submit">Place Order</button>
        </div>
      </form>
    </section>

    <aside class="panel order-panel" id="paymentSummary"></aside>
  </div>
</div>

<div id="footer"></div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
mountChrome();

const draft = JSON.parse(localStorage.getItem("ag_checkout_draft") || "null");
if(!draft){
  toast("Continue checkout first");
  setTimeout(()=>location.href="checkout.html",700);
}

function renderAddress(){
  if(!draft) return;
  document.getElementById("addressCard").innerHTML = `
    <h3>Shipping Address</h3>
    <p>${draft.fullName}</p>
    <p>${draft.address1}${draft.address2 ? ", " + draft.address2 : ""}</p>
    <p>${draft.city}, ${draft.state} - ${draft.pincode}</p>
    <p>${draft.phone}</p>
    <p>${draft.email}</p>`;
}

function renderSummary(){
  if(!draft) return;
  document.getElementById("paymentSummary").innerHTML = `
    <div class="panel-head">
      <div>
        <h2>Payment Summary</h2>
        <p>Final review before purchase.</p>
      </div>
      <span class="step-badge">Ready to pay</span>
    </div>
    <div class="summary-items">
      ${draft.items.map(i=>`
        <div class="summary-item">
          <img src="${i.img}" alt="${i.name}">
          <div>
            <h4>${i.name}</h4>
            <span>${i.qty} x ${formatINR(toINR(i.price))}</span>
          </div>
          <strong>${formatINR(toINR(i.price*i.qty))}</strong>
        </div>`).join("")}
    </div>
    <div class="summary-lines">
      <div class="line"><span>Subtotal</span><span>${formatINR(toINR(draft.subtotal))}</span></div>
      <div class="line"><span>Shipping</span><span>${draft.shipping===0?"FREE":formatINR(toINR(draft.shipping))}</span></div>
      <div class="line"><span>Tax</span><span>${formatINR(toINR(draft.tax))}</span></div>
      <div class="total"><span>Total</span><span>${formatINR(toINR(draft.total))}</span></div>
    </div>
    <div class="policy-box">
      <strong>Client-ready demo</strong>
      <p>The order goes to a thank-you page and clears the cart locally so the flow behaves like a complete storefront.</p>
    </div>`;
}

function getSelectedMethod(){
  return document.querySelector('input[name="payMethod"]:checked').value;
}

function syncMethodUI(){
  const method = getSelectedMethod();
  document.querySelectorAll(".payment-option").forEach(label=>{
    const input = label.querySelector("input");
    label.classList.toggle("active", input.checked);
  });
  document.getElementById("cardFields").style.display = method === "card" ? "grid" : "none";
  document.getElementById("upiId").closest(".field").style.display = method === "upi" ? "block" : "none";
}

document.querySelectorAll('input[name="payMethod"]').forEach(input=>input.addEventListener("change", syncMethodUI));

document.getElementById("paymentForm").addEventListener("submit", e=>{
  e.preventDefault();
  if(!draft) return;

  const method = getSelectedMethod();
  const order = {
    id: `AG${Date.now().toString().slice(-8)}`,
    placedAt: new Date().toISOString(),
    method,
    customer: {
      fullName: draft.fullName,
      phone: draft.phone,
      email: draft.email
    },
    address: {
      address1: draft.address1,
      address2: draft.address2,
      city: draft.city,
      state: draft.state,
      pincode: draft.pincode,
      delivery: draft.delivery,
      note: draft.note || ""
    },
    payment: {
      type: method,
      label: method === "upi" ? "UPI" : method === "card" ? "Card" : "Cash on Delivery"
    },
    items: draft.items,
    subtotal: draft.subtotal,
    shipping: draft.shipping,
    tax: draft.tax,
    total: draft.total,
    currency: "INR"
  };

  if(method === "card"){
    const cardName = document.getElementById("cardName").value.trim();
    const cardNumber = document.getElementById("cardNumber").value.trim();
    const expiry = document.getElementById("expiry").value.trim();
    const cvv = document.getElementById("cvv").value.trim();
    if(!cardName || !cardNumber || !expiry || !cvv){
      toast("Please complete card details");
      return;
    }
    order.payment.details = { cardName, cardNumberLast4: cardNumber.replace(/\D/g, "").slice(-4), expiry };
  }

  if(method === "upi"){
    const upiId = document.getElementById("upiId").value.trim();
    if(!upiId){
      toast("Enter your UPI ID");
      return;
    }
    order.payment.details = { upiId };
  }

  localStorage.setItem("ag_last_order", JSON.stringify(order));
  localStorage.removeItem("ag_checkout_draft");
  localStorage.removeItem("ag_cart");
  updateBadges();
  setTimeout(()=>location.href="thankyou.html",200);
});

renderAddress();
renderSummary();
syncMethodUI();
</script>
</body>
</html>
