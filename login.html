<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — AutoGear</title>
<link rel="icon" href="images/logo.png">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<div class="auth-wrap">
  <div class="auth">
    <h1>Welcome back</h1>
    <p class="sub">Login to access your account, orders and wishlist.</p>
    <div class="alert err" id="err"></div>
    <form id="form">
      <div class="field"><label>Email</label><input type="email" id="email" required></div>
      <div class="field"><label>Password</label><input type="password" id="pwd" required></div>
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13.5px;color:var(--muted)">
        <input type="checkbox" id="remember" checked> Remember me
      </label>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
    <p class="alt">New to AutoGear? <a href="signup.html">Create an account</a></p>
  </div>
</div>
<div id="footer"></div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
mountChrome();
document.getElementById("form").onsubmit = e=>{
  e.preventDefault();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const pwd = document.getElementById("pwd").value;
  const remember = document.getElementById("remember").checked;
  const err = document.getElementById("err");
  const user = getUsers().find(u=>u.email===email && u.password===pwd);
  if(!user){ err.textContent="Invalid email or password."; err.classList.add("show"); return; }
  const session = JSON.stringify({name:user.name, email:user.email});
  if(remember) localStorage.setItem(SESSION_KEY, session);
  else sessionStorage.setItem(SESSION_KEY, session);
  toast("Welcome back, "+user.name+"!");
  setTimeout(()=>location.href="index.html", 700);
};
</script>
</body>
</html>
