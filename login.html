<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In</title>
<link rel="icon" type="image/png" href="https://cdn.shopify.com/s/files/1/0757/0722/0250/files/faveicon.png?v=1726735244&amp;crop=center&amp;width=32&amp;height=32">
<link rel="shortcut icon" type="image/png" href="https://cdn.shopify.com/s/files/1/0757/0722/0250/files/faveicon.png?v=1726735244&amp;crop=center&amp;width=32&amp;height=32">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-shop-page">

<div class="auth-shop-wrap">
  <div class="auth-shop">
    <div class="auth-shop-logo"></div>

    <h1 id="authTitle">Sign in</h1>
    <p class="sub" id="authSub">Sign in or create an account</p>

    <div class="alert err" id="err"></div>

    <div id="stepEmail">
      <button type="button" class="auth-shop-continue" id="shopBtn">Continue with shop</button>
      <div class="auth-shop-or">or</div>
      <form id="emailForm">
        <div class="auth-email-wrap">
          <input type="email" id="email" placeholder="Email" autocomplete="email" required>
          <button type="submit" class="auth-email-arrow" aria-label="Continue">→</button>
        </div>
        <label class="auth-check">
          <input type="checkbox" id="newsletter" checked>
          <span>Email me with news and offers</span>
        </label>
        <p class="auth-terms">By continuing, you agree to our <a href="contact.html">Terms of service</a></p>
      </form>
    </div>

    <div id="stepPassword" hidden>
      <button type="button" class="auth-back" id="backFromLogin">← Back</button>
      <p class="auth-email-chip" id="loginEmailChip"></p>
      <form id="loginForm">
        <div class="field">
          <label for="pwd">Password</label>
          <input type="password" id="pwd" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="auth-shop-continue">Sign in</button>
      </form>
    </div>

    <div id="stepRegister" hidden>
      <button type="button" class="auth-back" id="backFromRegister">← Back</button>
      <p class="auth-email-chip" id="registerEmailChip"></p>
      <form id="registerForm">
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="Your name" autocomplete="name" required>
        </div>
        <div class="field">
          <label for="newPwd">Create password</label>
          <input type="password" id="newPwd" placeholder="Min. 6 characters" minlength="6" autocomplete="new-password" required>
        </div>
        <div class="field">
          <label for="confirmPwd">Confirm password</label>
          <input type="password" id="confirmPwd" placeholder="Re-enter password" minlength="6" autocomplete="new-password" required>
        </div>
        <button type="submit" class="auth-shop-continue">Create account</button>
      </form>
    </div>
  </div>

  <p class="auth-privacy"><a href="contact.html">Privacy policy</a></p>
</div>

<script>window.dataLayer=window.dataLayer||[];</script>
<script src="js/mcp-datalayer.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/styler-sitemap.js" defer></script>
<script>
if(typeof pushMcpLoginPage === "function") pushMcpLoginPage();

document.querySelector(".auth-shop-logo").innerHTML = siteLogoImg(130, 28);

const params = new URLSearchParams(location.search);
const returnTo = params.get("return") || "index.html";
let pendingEmail = "";

const err = document.getElementById("err");
const stepEmail = document.getElementById("stepEmail");
const stepPassword = document.getElementById("stepPassword");
const stepRegister = document.getElementById("stepRegister");
const authTitle = document.getElementById("authTitle");
const authSub = document.getElementById("authSub");

function showErr(msg){
  err.textContent = msg;
  err.classList.add("show");
}
function clearErr(){
  err.textContent = "";
  err.classList.remove("show");
}

function showStep(step){
  clearErr();
  stepEmail.hidden = step !== "email";
  stepPassword.hidden = step !== "password";
  stepRegister.hidden = step !== "register";
  if(step === "email"){
    authTitle.textContent = "Sign in";
    authSub.textContent = "Sign in or create an account";
  } else if(step === "password"){
    authTitle.textContent = "Welcome back";
    authSub.textContent = "Enter your password to sign in";
    document.getElementById("loginEmailChip").textContent = pendingEmail;
    document.getElementById("pwd").value = "";
    setTimeout(() => document.getElementById("pwd").focus(), 50);
  } else {
    authTitle.textContent = "Create account";
    authSub.textContent = "Set up your new TVS account";
    document.getElementById("registerEmailChip").textContent = pendingEmail;
    document.getElementById("name").value = "";
    document.getElementById("newPwd").value = "";
    document.getElementById("confirmPwd").value = "";
    setTimeout(() => document.getElementById("name").focus(), 50);
  }
}

function goAfterAuth(name){
  toast("Welcome" + (name ? ", " + name : "") + "!");
  setTimeout(() => location.href = returnTo, 700);
}

document.getElementById("shopBtn").addEventListener("click", () => {
  continueWithShop();
  goAfterAuth("Shop Customer");
});

document.getElementById("emailForm").addEventListener("submit", e => {
  e.preventDefault();
  clearErr();
  pendingEmail = document.getElementById("email").value.trim().toLowerCase();
  if(!pendingEmail){ showErr("Please enter your email."); return; }
  if(findUserByEmail(pendingEmail)) showStep("password");
  else showStep("register");
});

document.getElementById("backFromLogin").addEventListener("click", () => showStep("email"));
document.getElementById("backFromRegister").addEventListener("click", () => showStep("email"));

document.getElementById("loginForm").addEventListener("submit", e => {
  e.preventDefault();
  clearErr();
  const user = loginWithEmail(pendingEmail, document.getElementById("pwd").value, true);
  if(!user){ showErr("Incorrect password. Please try again."); return; }
  goAfterAuth(user.name);
});

document.getElementById("registerForm").addEventListener("submit", e => {
  e.preventDefault();
  clearErr();
  const pwd = document.getElementById("newPwd").value;
  const cpwd = document.getElementById("confirmPwd").value;
  if(pwd !== cpwd){ showErr("Passwords do not match."); return; }
  const result = registerWithEmail(
    document.getElementById("name").value,
    pendingEmail,
    pwd,
    { newsletter: document.getElementById("newsletter").checked }
  );
  if(!result.ok){ showErr(result.error); return; }
  goAfterAuth(result.user.name);
});

if(currentUser()) location.replace(returnTo);
</script>
</body>
</html>
