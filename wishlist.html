<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wishlist — TVS Motors</title>
<link rel="icon" type="image/png" href="https://cdn.shopify.com/s/files/1/0757/0722/0250/files/faveicon.png?v=1726735244&amp;crop=center&amp;width=32&amp;height=32">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<div class="container cart-wrap">
  <h1>My Wishlist</h1>
  <div id="wishBody"></div>
</div>
<div id="footer"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
mountChrome();
function render(){
  const items = getWish().map(id=>PRODUCTS.find(p=>p.id===id)).filter(Boolean);
  if(!items.length){
    document.getElementById("wishBody").innerHTML = `
      <div class="empty"><div class="ico">♥</div><h3>Your wishlist is empty</h3>
      <p>Save items you love for later.</p>
      <a href="shop.html" class="btn btn-primary">Browse Products</a></div>`;
    return;
  }
  document.getElementById("wishBody").innerHTML = `<div class="grid">${items.map(productCard).join("")}</div>`;
}
render();
</script>
</body>
</html>
