<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kids Wear — TVS Motor Company</title>
<meta name="description" content="Shop TVS Kids Wear — skull caps, neck gaiters, arm sleeves and more for young riders.">
<link rel="icon" type="image/png" href="https://cdn.shopify.com/s/files/1/0757/0722/0250/files/faveicon.png?v=1726735244&amp;crop=center&amp;width=32&amp;height=32">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script type="text/javascript" src="//cdn.evgnet.com/beacon/a556rq555550mxe43n3n3n091568480/tvs/scripts/evergage.min.js"></script>
</head>
<body class="kids-page">
<div id="header"></div>

<div class="kids-top">
  <div class="container">
    <nav class="kids-breadcrumbs" aria-label="Breadcrumb">
      <a href="index.html">Home</a>
      <span>›</span>
      <span>Kids wear</span>
    </nav>

    <div class="kids-toolbar">
      <button type="button" class="kids-filter-btn" id="filterBtn" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
        Filter
      </button>
      <div class="kids-sort">
        <label for="kidsSort">Sort by:</label>
        <select id="kidsSort">
          <option value="price-asc">Price, low to high</option>
          <option value="price-desc">Price, high to low</option>
          <option value="rating">Top rated</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <div class="kids-view">
        <span>View as</span>
        <button type="button" class="kids-view-btn active" data-view="grid" aria-label="Grid view" title="Grid">▦</button>
        <button type="button" class="kids-view-btn" data-view="list" aria-label="List view" title="List">☰</button>
      </div>
    </div>

    <div class="kids-filter-panel" id="filterPanel" hidden>
      <button type="button" class="kids-filter-chip active" data-type="">All</button>
      <button type="button" class="kids-filter-chip" data-type="cap">Skull Caps</button>
      <button type="button" class="kids-filter-chip" data-type="gaiter">Neck Gaiters</button>
      <button type="button" class="kids-filter-chip" data-type="sleeve">Arm Sleeves</button>
    </div>
  </div>
</div>

<section class="kids-catalog">
  <div class="container">
    <div class="kids-grid" id="kidsGrid"></div>
    <div class="kids-empty" id="kidsEmpty" hidden>
      <p>No products match your filters.</p>
      <button type="button" class="kids-select-btn" onclick="resetKidsFilters()">Clear filters</button>
    </div>
    <nav class="kids-pagination" id="kidsPagination" aria-label="Pagination"></nav>
  </div>
</section>

<div id="footer"></div>

<script>window.dataLayer=window.dataLayer||[];</script>
<script src="js/mcp-datalayer.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/styler-sitemap.js" defer></script>
<script>
mountChrome("kids");

const searchInput = document.getElementById("headerSearch");
if(searchInput) searchInput.placeholder = "Search for collections";

const params = new URLSearchParams(location.search);
const PER_PAGE = 8;
const state = {
  type: params.get("type") || "",
  sort: "price-asc",
  view: "grid",
  page: parseInt(params.get("page"), 10) || 1
};

if(state.type){
  document.querySelectorAll(".kids-filter-chip").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.type === state.type);
  });
  document.getElementById("filterPanel").hidden = false;
  document.getElementById("filterBtn").setAttribute("aria-expanded", "true");
}

function getFilteredKids(){
  let list = [...KIDS_PRODUCTS];
  if(state.type) list = list.filter(p => p.kidsType === state.type);
  switch(state.sort){
    case "price-desc": list.sort((a, b) => b.price - a.price); break;
    case "rating": list.sort((a, b) => b.rating - a.rating || b.reviews - a.reviews); break;
    case "name": list.sort((a, b) => a.name.localeCompare(b.name)); break;
    default: list.sort((a, b) => a.price - b.price);
  }
  return list;
}

function renderKids(){
  const list = getFilteredKids();
  const totalPages = Math.max(1, Math.ceil(list.length / PER_PAGE));
  if(state.page > totalPages) state.page = totalPages;
  const start = (state.page - 1) * PER_PAGE;
  const pageItems = list.slice(start, start + PER_PAGE);

  const grid = document.getElementById("kidsGrid");
  const empty = document.getElementById("kidsEmpty");
  grid.classList.toggle("list-view", state.view === "list");

  if(!pageItems.length){
    grid.innerHTML = "";
    empty.hidden = false;
    document.getElementById("kidsPagination").innerHTML = "";
    if(typeof pushMcpCategoryPage === "function") pushMcpCategoryPage("kids_wear", "Kids Wear", list);
    return;
  }
  empty.hidden = true;
  grid.innerHTML = pageItems.map(kidsWearCard).join("");
  if(typeof pushMcpCategoryPage === "function") pushMcpCategoryPage("kids_wear", "Kids Wear", list);

  const pag = document.getElementById("kidsPagination");
  if(totalPages <= 1){
    pag.innerHTML = "";
    return;
  }
  let html = `<button type="button" ${state.page === 1 ? "disabled" : ""} onclick="goKidsPage(${state.page - 1})">Previous</button>`;
  for(let i = 1; i <= totalPages; i++){
    html += `<button type="button" class="${i === state.page ? "active" : ""}" onclick="goKidsPage(${i})">${i}</button>`;
  }
  html += `<button type="button" ${state.page === totalPages ? "disabled" : ""} onclick="goKidsPage(${state.page + 1})">Next</button>`;
  pag.innerHTML = html;
}

function goKidsPage(n){
  state.page = n;
  const q = new URLSearchParams();
  if(state.type) q.set("type", state.type);
  if(n > 1) q.set("page", n);
  history.replaceState(null, "", q.toString() ? `kids-wear.html?${q}` : "kids-wear.html");
  renderKids();
  window.scrollTo({ top: document.querySelector(".kids-catalog").offsetTop - 100, behavior: "smooth" });
}

function resetKidsFilters(){
  state.type = "";
  state.page = 1;
  document.querySelectorAll(".kids-filter-chip").forEach(b => b.classList.toggle("active", !b.dataset.type));
  history.replaceState(null, "", "kids-wear.html");
  renderKids();
}

document.getElementById("kidsSort").addEventListener("change", e => {
  state.sort = e.target.value;
  state.page = 1;
  renderKids();
});

document.getElementById("filterBtn").addEventListener("click", () => {
  const panel = document.getElementById("filterPanel");
  const open = panel.hidden;
  panel.hidden = !open;
  document.getElementById("filterBtn").setAttribute("aria-expanded", open ? "true" : "false");
});

document.getElementById("filterPanel").addEventListener("click", e => {
  const chip = e.target.closest(".kids-filter-chip");
  if(!chip) return;
  state.type = chip.dataset.type;
  state.page = 1;
  document.querySelectorAll(".kids-filter-chip").forEach(b => b.classList.toggle("active", b === chip));
  const q = state.type ? `?type=${state.type}` : "";
  history.replaceState(null, "", `kids-wear.html${q}`);
  renderKids();
});

document.querySelectorAll(".kids-view-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    state.view = btn.dataset.view;
    document.querySelectorAll(".kids-view-btn").forEach(b => b.classList.toggle("active", b === btn));
    renderKids();
  });
});

renderKids();
</script>
</body>
</html>
