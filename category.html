<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Category — TVS Motor Company</title>
<link rel="icon" type="image/png" href="https://cdn.shopify.com/s/files/1/0757/0722/0250/files/faveicon.png?v=1726735244&amp;crop=center&amp;width=32&amp;height=32">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script type="text/javascript" src="//cdn.evgnet.com/beacon/a556rq555550mxe43n3n3n091568480/tvs/scripts/evergage.min.js"></script>
</head>
<body class="cat-page">
<div id="header"></div>

<div class="cat-top">
  <div class="container">
    <nav class="cat-breadcrumbs" id="catBreadcrumbs" aria-label="Breadcrumb"></nav>
  </div>
</div>

<section class="cat-hero" id="catHero"></section>

<section class="cat-models-wrap">
  <div class="container">
    <div class="cat-model-tabs" id="modelTabs"></div>
  </div>
</section>

<div class="cat-toolbar-wrap">
  <div class="container">
    <div class="cat-toolbar">
      <button type="button" class="cat-filter-btn" id="filterBtn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
        Filter <span id="filterCount"></span>
      </button>
      <div class="cat-sort">
        <label for="catSort">Sort by:</label>
        <select id="catSort">
          <option value="bestselling">Best selling</option>
          <option value="price-asc">Price, low to high</option>
          <option value="price-desc">Price, high to low</option>
          <option value="rating">Top rated</option>
        </select>
      </div>
      <div class="cat-view">
        <span>View as</span>
        <button type="button" class="cat-view-btn active" data-view="grid" aria-label="Grid">▦</button>
        <button type="button" class="cat-view-btn" data-view="list" aria-label="List">☰</button>
      </div>
    </div>
  </div>
</div>

<section class="cat-catalog products-section">
  <div class="container">
    <div class="cat-grid" id="catGrid"></div>
    <div class="cat-empty" id="catEmpty" hidden>
      <p>No products in this category yet.</p>
      <a href="shop.html">Browse all accessories</a>
    </div>
    <nav class="cat-pagination" id="catPagination" aria-label="Pagination"></nav>
  </div>
</section>

<section class="cat-seo">
  <div class="container">
    <h2 id="catSeoTitle"></h2>
    <p id="catSeoText1"></p>
    <p id="catSeoText2"></p>
  </div>
</section>

<section class="cat-faq">
  <div class="container">
    <h2>Frequently Asked Questions</h2>
    <div class="cat-faq-list" id="catFaq"></div>
  </div>
</section>

<section class="cat-hot-models">
  <div class="container">
    <h3>Hot Models</h3>
    <div class="cat-hot-grid" id="hotModels"></div>
  </div>
</section>

<div id="footer"></div>

<script>window.dataLayer=window.dataLayer||[];</script>
<script src="js/mcp-datalayer.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
const slug = new URLSearchParams(location.search).get("slug") || "crash-guards";
const meta = CATEGORY_REGISTRY[slug];

if(!meta){
  location.replace("shop.html");
}

mountChrome(meta.navActive || "accessories");

const searchInput = document.getElementById("headerSearch");
if(searchInput) searchInput.placeholder = "Search for collections";
document.title = meta.title + " — TVS Motor Company";

const PER_PAGE = 8;
const state = { sort: "bestselling", view: "grid", page: 1, model: "" };

document.getElementById("catBreadcrumbs").innerHTML = `
  <a href="index.html">Home</a><span>›</span><span>${meta.title}</span>`;

document.getElementById("catHero").innerHTML = `
  <div class="container cat-hero-inner">
    <div class="cat-hero-copy">
      <h1>${meta.heroHeadline}</h1>
      <a href="#catGrid" class="cat-hero-btn">Shop Now</a>
    </div>
    <div class="cat-hero-media">
      <img src="${meta.heroImg}" alt="${meta.title}">
    </div>
  </div>`;

document.getElementById("catSeoTitle").textContent = meta.seoHeading;
document.getElementById("catSeoText1").textContent = `Genuine TVS ${meta.title.toLowerCase()} are engineered for perfect fitment, durability and everyday protection. Every part is tested to meet TVS quality standards.`;
document.getElementById("catSeoText2").textContent = `Browse ${meta.title.toLowerCase()} below, filter by your TVS model, and order with confidence — tax included, secure checkout, and nationwide delivery.`;

document.getElementById("catFaq").innerHTML = CATEGORY_FAQS.map(f => `
  <details class="cat-faq-item">
    <summary>${f.q}</summary>
    <p>${f.a}</p>
  </details>`).join("");

document.getElementById("hotModels").innerHTML = VEHICLE_MODELS.map(m =>
  `<a href="category.html?slug=${slug}&model=${m.id}">${m.name.replace("TVS ", "")}</a>`
).join("");

document.getElementById("modelTabs").innerHTML = `
  <button type="button" class="cat-model-tab active" data-model="">All Models</button>
  ${VEHICLE_MODELS.map(m => `<button type="button" class="cat-model-tab" data-model="${m.id}">${m.name.replace("TVS ", "")}</button>`).join("")}`;

const params = new URLSearchParams(location.search);
if(params.get("model")){
  state.model = params.get("model");
  document.querySelectorAll(".cat-model-tab").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.model === state.model);
  });
}

function getSortedProducts(){
  let list = getCategoryProducts(slug);
  switch(state.sort){
    case "price-asc": list.sort((a, b) => a.price - b.price); break;
    case "price-desc": list.sort((a, b) => b.price - a.price); break;
    case "rating": list.sort((a, b) => b.rating - a.rating || b.reviews - a.reviews); break;
    default: list.sort((a, b) => b.reviews - a.reviews);
  }
  return list;
}

function renderCatalog(){
  const list = getSortedProducts();
  const totalPages = Math.max(1, Math.ceil(list.length / PER_PAGE));
  if(state.page > totalPages) state.page = totalPages;
  const start = (state.page - 1) * PER_PAGE;
  const pageItems = list.slice(start, start + PER_PAGE);

  const grid = document.getElementById("catGrid");
  const empty = document.getElementById("catEmpty");
  grid.classList.toggle("list-view", state.view === "list");

  document.getElementById("filterCount").textContent = state.model ? "(1)" : "";

  if(!pageItems.length){
    grid.innerHTML = "";
    empty.hidden = false;
    document.getElementById("catPagination").innerHTML = "";
    if(typeof pushMcpCategoryPage === "function") pushMcpCategoryPage(slug, meta.title, list);
    return;
  }
  empty.hidden = true;
  grid.innerHTML = pageItems.map(collectionCard).join("");
  if(typeof pushMcpCategoryPage === "function"){
    pushMcpCategoryPage(slug, meta.title, list);
  }

  const pag = document.getElementById("catPagination");
  if(totalPages <= 1){ pag.innerHTML = ""; return; }
  let html = `<button type="button" ${state.page === 1 ? "disabled" : ""} onclick="goCatPage(${state.page - 1})">Previous</button>`;
  for(let i = 1; i <= totalPages; i++){
    html += `<button type="button" class="${i === state.page ? "active" : ""}" onclick="goCatPage(${i})">${i}</button>`;
  }
  html += `<button type="button" ${state.page === totalPages ? "disabled" : ""} onclick="goCatPage(${state.page + 1})">Next</button>`;
  pag.innerHTML = html;
}

function goCatPage(n){
  state.page = n;
  renderCatalog();
  document.querySelector(".cat-catalog").scrollIntoView({ behavior: "smooth", block: "start" });
}

document.getElementById("catSort").addEventListener("change", e => {
  state.sort = e.target.value;
  state.page = 1;
  renderCatalog();
});

document.getElementById("filterBtn").addEventListener("click", () => toast("Filters — demo"));

document.querySelectorAll(".cat-view-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    state.view = btn.dataset.view;
    document.querySelectorAll(".cat-view-btn").forEach(b => b.classList.toggle("active", b === btn));
    renderCatalog();
  });
});

document.getElementById("modelTabs").addEventListener("click", e => {
  const tab = e.target.closest(".cat-model-tab");
  if(!tab) return;
  state.model = tab.dataset.model;
  state.page = 1;
  document.querySelectorAll(".cat-model-tab").forEach(t => t.classList.toggle("active", t === tab));
  const q = new URLSearchParams({ slug });
  if(state.model) q.set("model", state.model);
  history.replaceState(null, "", `category.html?${q}`);
  renderCatalog();
});

renderCatalog();
</script>
</body>
</html>
